<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repomix · Smart Repository Packer</title>
  <style>
    * { box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 20px;
      color: #e2e8f0;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 30px; }
    .header h1 {
      font-size: 2.5rem;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin: 0;
    }
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 24px;
    }
    @media (max-width: 1000px) { .main-grid { grid-template-columns: 1fr; } }
    .card {
      background: #1e293b;
      border-radius: 20px;
      padding: 24px;
      border: 1px solid #334155;
    }
    .card h2 {
      font-size: 1.25rem;
      margin: 0 0 20px 0;
      border-left: 4px solid #8b5cf6;
      padding-left: 14px;
    }
    .source-grid {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    .source-btn {
      flex: 1;
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 12px;
      padding: 10px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .source-btn.active {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      border-color: #a78bfa;
      color: white;
    }
    .input-group { margin-top: 20px; }
    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #475569;
      background: #0f172a;
      color: #e2e8f0;
    }
    .flex-row { display: flex; gap: 12px; }
    button {
      background: #475569;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      color: white;
      transition: all 0.2s;
    }
    button.primary { background: linear-gradient(135deg, #8b5cf6, #6d28d9); }
    button.success { background: linear-gradient(135deg, #10b981, #059669); }
    button.secondary { background: #334155; }
    .options-panel {
      background: #0f172a;
      border-radius: 16px;
      padding: 16px;
      margin: 16px 0;
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 10px 0;
    }
    .ignore-area {
      background: #0f172a;
      border-radius: 16px;
      padding: 16px;
      margin: 16px 0;
    }
    .analysis-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    .analysis-stat {
      text-align: center;
      padding: 12px;
      background: #0f172a;
      border-radius: 12px;
    }
    .analysis-stat-value {
      font-size: 1.5rem;
      font-weight: 800;
      color: #10b981;
    }
    .file-tree-container {
      background: #0f172a;
      border-radius: 16px;
      padding: 16px;
      max-height: 500px;
      overflow: auto;
      font-family: monospace;
      font-size: 0.75rem;
      margin-top: 16px;
    }
    .tree-node { list-style: none; margin-left: 0; padding-left: 0; }
    .tree-node .tree-node { margin-left: 20px; }
    .tree-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 0;
      cursor: pointer;
    }
    .tree-item:hover { background: #1e293b; }
    .tree-toggle {
      width: 16px;
      font-size: 8px;
      cursor: pointer;
      color: #60a5fa;
    }
    .tree-toggle.empty { opacity: 0; cursor: default; }
    .tree-checkbox { width: 14px; height: 14px; cursor: pointer; }
    .stats-bar {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      background: #0f172a;
      border-radius: 12px;
      margin: 16px 0;
    }
    .stat { text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: 800; color: #8b5cf6; }
    .status {
      background: #0f172a;
      border-radius: 12px;
      padding: 12px;
      margin: 16px 0;
      border-left: 4px solid #8b5cf6;
    }
    .status.error { border-left-color: #ef4444; background: #7f1a1a; }
    .status.success { border-left-color: #10b981; background: #064e3b; }
    pre {
      background: #0f172a;
      padding: 16px;
      border-radius: 12px;
      overflow: auto;
      font-size: 11px;
      max-height: 500px;
      font-family: monospace;
      white-space: pre-wrap;
    }
    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .button-group {
      display: flex;
      gap: 10px;
    }
    .copy-btn, .download-text-btn {
      padding: 6px 14px;
      font-size: 0.8rem;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      color: white;
    }
    .copy-btn { background: linear-gradient(135deg, #3b82f6, #2563eb); }
    .download-text-btn { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .copy-btn:hover, .download-text-btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
    progress {
      width: 100%;
      height: 8px;
      border-radius: 4px;
      display: none;
    }
    .badge {
      background: #334155;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 0.7rem;
      display: inline-block;
      margin-top: 8px;
    }
    .action-buttons { display: flex; gap: 12px; margin-top: 16px; }
    .action-buttons button { flex: 1; }
    .file-tree-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .selection-stats {
      font-size: 0.7rem;
      color: #94a3b8;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📦 Repomix</h1>
    <p>Select files, preview text (7z compressed), download as ZIP</p>
  </div>
  <div class="main-grid">
    <div class="card">
      <h2>🎯 Step 1: Source</h2>
      <div class="source-grid">
        <button id="btnGithub" class="source-btn active">🐙 GitHub</button>
        <button id="btnLocal" class="source-btn">📁 Local</button>
        <button id="btnZip" class="source-btn">🗜️ ZIP</button>
      </div>
      <div id="githubBlock">
        <div class="input-group">
          <label>GitHub Repository</label>
          <div class="flex-row">
            <input type="text" id="repoUrl" placeholder="owner/repo" value="facebook/react" />
            <button id="analyzeBtn" class="primary">🔍 Analyze</button>
          </div>
        </div>
      </div>
      <div id="localBlock" style="display:none">
        <input type="file" id="folderPicker" webkitdirectory directory multiple />
      </div>
      <div id="zipBlock" style="display:none">
        <input type="file" id="zipUpload" accept=".zip" />
      </div>
      
      <h2>🚫 Ignore Rules</h2>
      <div class="ignore-area">
        <textarea id="ignorePatterns" rows="4" placeholder="node_modules/&#10;.git/&#10;dist/"></textarea>
      </div>
      
      <h2>⚙️ Options</h2>
      <div class="options-panel">
        <div class="checkbox-group">
          <input type="checkbox" id="includeDirectoryStructure" checked />
          <label>📁 Include Directory Structure</label>
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="showLineNumbers" />
          <label>🔢 Show Line Numbers</label>
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="removeComments" />
          <label>💬 Remove Comments</label>
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="removeEmptyLines" />
          <label>📏 Remove Empty Lines</label>
        </div>
      </div>
    </div>
    
    <div class="card">
      <h2>📊 Analysis</h2>
      <div id="analysisPanel" style="display:none">
        <div class="analysis-stats">
          <div class="analysis-stat"><div class="analysis-stat-value" id="totalFiles">0</div><div>Files</div></div>
          <div class="analysis-stat"><div class="analysis-stat-value" id="totalSize">0</div><div>Size</div></div>
          <div class="analysis-stat"><div class="analysis-stat-value" id="cacheStatus">-</div><div>Cache</div></div>
        </div>
      </div>
      
      <h2>🌲 Select Files</h2>
      <div class="file-tree-header">
        <div class="selection-stats" id="selectionStats">📊 0 files selected</div>
        <div>
          <button id="expandAllBtn" style="padding: 4px 10px; font-size: 0.7rem">📂 Expand</button>
          <button id="collapseAllBtn" style="padding: 4px 10px; font-size: 0.7rem">📁 Collapse</button>
        </div>
      </div>
      <div class="file-tree-container" id="fileTreeContainer">
        <div style="text-align:center; padding:40px">🔍 Analyze a repository first</div>
      </div>
      
      <div class="stats-bar">
        <div class="stat"><div class="stat-value" id="selectedCount">0</div><div>Files</div></div>
        <div class="stat"><div class="stat-value" id="selectedSize">0</div><div>KB</div></div>
      </div>
      
      <div class="action-buttons">
        <button id="previewBtn" class="success" disabled>📄 Generate & Preview (7z)</button>
        <button id="downloadZipBtn" class="primary" disabled>📦 Download ZIP</button>
        <button id="resetBtn" class="secondary">⟳ Reset</button>
      </div>
      
      <div id="statusMsg" class="status"></div>
      
      <div id="outputContainer" style="display:none">
        <div class="output-header">
          <h2>📄 Text Preview</h2>
          <div class="button-group">
            <button id="downloadTextBtn" class="download-text-btn">💾 Save as Text</button>
            <button id="copyBtn" class="copy-btn">📋 Copy</button>
          </div>
        </div>
        <pre id="output">—</pre>
      </div>
      <progress id="progressBar" value="0" max="100"></progress>
    </div>
  </div>
</div>

<script>
// ========== CONFIG ==========
const BACKEND_URL = "https://repomix.onrender.com";
const DEFAULT_IGNORE = `node_modules/\n.git/\n.DS_Store\ndist/\nbuild/\ncoverage/\n*.min.js\n__pycache__/\n.env\npackage-lock.json\nyarn.lock\n*.log\n*.jpg\n*.png\n*.mp4`;

// ========== DOM ==========
const analyzeBtn = document.getElementById("analyzeBtn");
const previewBtn = document.getElementById("previewBtn");
const downloadZipBtn = document.getElementById("downloadZipBtn");
const resetBtn = document.getElementById("resetBtn");
const repoInput = document.getElementById("repoUrl");
const ignoreTextarea = document.getElementById("ignorePatterns");
const includeDirStructure = document.getElementById("includeDirectoryStructure");
const showLineNumbers = document.getElementById("showLineNumbers");
const removeComments = document.getElementById("removeComments");
const removeEmptyLines = document.getElementById("removeEmptyLines");
const fileTreeContainer = document.getElementById("fileTreeContainer");
const statusDiv = document.getElementById("statusMsg");
const outputContainer = document.getElementById("outputContainer");
const outputPre = document.getElementById("output");
const copyBtn = document.getElementById("copyBtn");
const downloadTextBtn = document.getElementById("downloadTextBtn");
const progressBar = document.getElementById("progressBar");
const totalFilesSpan = document.getElementById("totalFiles");
const totalSizeSpan = document.getElementById("totalSize");
const cacheStatusSpan = document.getElementById("cacheStatus");
const selectedCountSpan = document.getElementById("selectedCount");
const selectedSizeSpan = document.getElementById("selectedSize");
const selectionStatsSpan = document.getElementById("selectionStats");
const analysisPanel = document.getElementById("analysisPanel");
const btnGithub = document.getElementById("btnGithub");
const btnLocal = document.getElementById("btnLocal");
const btnZip = document.getElementById("btnZip");
const githubBlock = document.getElementById("githubBlock");
const localBlock = document.getElementById("localBlock");
const zipBlock = document.getElementById("zipBlock");
const folderPicker = document.getElementById("folderPicker");
const zipUpload = document.getElementById("zipUpload");
const expandAllBtn = document.getElementById("expandAllBtn");
const collapseAllBtn = document.getElementById("collapseAllBtn");

ignoreTextarea.value = DEFAULT_IGNORE;

// ========== STATE ==========
let fileTreeData = null;
let allFiles = [];
let selectedFiles = new Set();
let expandedFolders = new Set();
let currentOwner = "", currentRepo = "", currentRepoId = null;
let currentSourceType = "github";
let currentTextContent = "";

// ========== HELPERS ==========
function formatSize(bytes) {
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + " KB";
  return (bytes/1024/1024).toFixed(1) + " MB";
}

function parseRepo(input) {
  let clean = input.trim().replace(/\/$/, "");
  let match = clean.match(/github\.com\/([^\/]+)\/([^\/]+)/);
  if (match) return { owner: match[1], repo: match[2] };
  let parts = clean.split("/");
  if (parts.length === 2) return { owner: parts[0], repo: parts[1] };
  return null;
}

function showStatus(msg, type = "info") {
  statusDiv.innerHTML = msg;
  statusDiv.className = "status";
  if (type === "success") statusDiv.className = "status success";
  if (type === "error") statusDiv.className = "status error";
}

function getIgnorePatterns() {
  return ignoreTextarea.value.split(/\r?\n/).filter(l => l.trim());
}

function updateSelectionStats() {
  let totalChars = 0;
  for (let f of allFiles) {
    if (selectedFiles.has(f.path)) totalChars += f.size;
  }
  selectedCountSpan.innerText = selectedFiles.size;
  selectedSizeSpan.innerText = (totalChars / 1024).toFixed(1);
  selectionStatsSpan.innerHTML = `📊 ${selectedFiles.size} files selected (${(totalChars / 1024).toFixed(1)} KB)`;
}

// ========== FILE TREE ==========
function buildFileTree(paths, rootName, sizes) {
  let tree = { name: rootName, type: "folder", children: {}, files: [], path: rootName };
  for (let p of paths) {
    let parts = p.split("/");
    let current = tree;
    for (let i = 0; i < parts.length; i++) {
      let isLast = i === parts.length - 1;
      if (isLast) {
        current.files.push({ name: parts[i], path: p, size: sizes.get(p) || 0 });
      } else {
        if (!current.children[parts[i]]) {
          current.children[parts[i]] = { name: parts[i], type: "folder", children: {}, files: [], path: current.path + "/" + parts[i] };
        }
        current = current.children[parts[i]];
      }
    }
  }
  return tree;
}

function renderTree(node) {
  let isExpanded = expandedFolders.has(node.path);
  let hasChildren = Object.keys(node.children).length > 0 || node.files.length > 0;
  let html = `<div class="tree-node"><div class="tree-item">`;
  html += hasChildren ? `<span class="tree-toggle" data-toggle="${node.path}">${isExpanded ? "▼" : "▶"}</span>` : `<span class="tree-toggle empty"></span>`;
  
  let allSelected = true;
  for (let f of node.files) if (!selectedFiles.has(f.path)) { allSelected = false; break; }
  for (let child in node.children) {
    for (let f of node.children[child].files) if (!selectedFiles.has(f.path)) { allSelected = false; break; }
  }
  
  html += `<input type="checkbox" class="tree-checkbox" data-folder="${node.path}" ${allSelected && hasChildren ? "checked" : ""}>`;
  html += `<span class="tree-icon">${hasChildren ? "📁" : "📄"}</span>`;
  html += `<span class="tree-label" data-toggle="${node.path}">${node.name}</span>`;
  html += `</div>`;
  
  if (hasChildren && isExpanded) {
    html += `<div class="folder-content">`;
    for (let child of Object.keys(node.children).sort()) html += renderTree(node.children[child]);
    for (let file of node.files.sort((a,b) => a.name.localeCompare(b.name))) {
      html += `<div class="tree-node" style="margin-left:20px"><div class="tree-item"><span class="tree-toggle empty"></span><input type="checkbox" class="tree-checkbox" data-file="${file.path}" ${selectedFiles.has(file.path) ? "checked" : ""}><span class="tree-icon">📄</span><span class="tree-label">${file.name}</span></div></div>`;
    }
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

function attachEvents() {
  document.querySelectorAll(".tree-toggle[data-toggle]").forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      let path = el.dataset.toggle;
      expandedFolders.has(path) ? expandedFolders.delete(path) : expandedFolders.add(path);
      refreshTree();
    };
  });
  document.querySelectorAll(".tree-label[data-toggle]").forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      let path = el.dataset.toggle;
      expandedFolders.has(path) ? expandedFolders.delete(path) : expandedFolders.add(path);
      refreshTree();
    };
  });
  document.querySelectorAll(".tree-checkbox[data-folder]").forEach(el => {
    el.onchange = (e) => {
      e.stopPropagation();
      let folderPath = el.dataset.folder;
      let setSelected = (node) => {
        for (let f of node.files) el.checked ? selectedFiles.add(f.path) : selectedFiles.delete(f.path);
        for (let child in node.children) setSelected(node.children[child]);
      };
      let findNode = (node, path) => {
        if (node.path === path) return node;
        for (let child in node.children) {
          let found = findNode(node.children[child], path);
          if (found) return found;
        }
        return null;
      };
      let folder = findNode(fileTreeData, folderPath);
      if (folder) setSelected(folder);
      refreshTree();
      updateSelectionStats();
    };
  });
  document.querySelectorAll(".tree-checkbox[data-file]").forEach(el => {
    el.onchange = (e) => {
      e.stopPropagation();
      let filePath = el.dataset.file;
      el.checked ? selectedFiles.add(filePath) : selectedFiles.delete(filePath);
      updateSelectionStats();
    };
  });
}

function refreshTree() {
  if (!fileTreeData) return;
  fileTreeContainer.innerHTML = renderTree(fileTreeData);
  attachEvents();
}

function expandAllFolders(node = fileTreeData) {
  if (!node) return;
  expandedFolders.add(node.path);
  for (let child in node.children) expandAllFolders(node.children[child]);
  refreshTree();
}

function collapseAllFolders(node = fileTreeData) {
  if (!node) return;
  expandedFolders.delete(node.path);
  for (let child in node.children) collapseAllFolders(node.children[child]);
  refreshTree();
}

expandAllBtn.onclick = () => { if (fileTreeData) expandAllFolders(); };
collapseAllBtn.onclick = () => { if (fileTreeData) collapseAllFolders(); };

// ========== GITHUB ANALYSIS ==========
async function analyzeGitHub() {
  let input = repoInput.value.trim();
  if (!input) { showError("Enter repo"); return; }
  let parsed = parseRepo(input);
  if (!parsed) { showError("Invalid format"); return; }
  
  currentOwner = parsed.owner;
  currentRepo = parsed.repo;
  showStatus(`📊 Analyzing ${currentOwner}/${currentRepo}...`);
  progressBar.style.display = "block";
  progressBar.value = 20;
  
  try {
    let res = await fetch(`${BACKEND_URL}/api/analyze`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        owner: currentOwner,
        repo: currentRepo,
        ignorePatterns: getIgnorePatterns()
      })
    });
    let data = await res.json();
    if (!data.success) throw new Error(data.error);
    
    currentRepoId = data.repoId;
    allFiles = Object.entries(data.fileTree).map(([path, size]) => ({ path, size }));
    totalFilesSpan.innerText = allFiles.length;
    totalSizeSpan.innerText = data.totalSizeKB + " KB";
    cacheStatusSpan.innerText = data.fromCache ? "✅ Cached" : "🆕 Fresh";
    analysisPanel.style.display = "block";
    
    selectedFiles.clear();
    for (let f of allFiles) selectedFiles.add(f.path);
    
    let sizeMap = new Map();
    for (let [path, size] of Object.entries(data.fileTree)) sizeMap.set(path, size);
    fileTreeData = buildFileTree(allFiles.map(f => f.path), `${currentOwner}_${currentRepo}`, sizeMap);
    expandedFolders.clear();
    expandedFolders.add(fileTreeData.path);
    refreshTree();
    updateSelectionStats();
    previewBtn.disabled = false;
    downloadZipBtn.disabled = false;
    progressBar.style.display = "none";
    showStatus(`✅ Found ${allFiles.length} files`, "success");
  } catch(err) {
    progressBar.style.display = "none";
    showError(err.message);
  }
}

// ========== DECOMPRESS 7z OR GZIP ==========
async function decompressData(compressedData, format) {
  if (format === '7z') {
    // For 7z, we need to use a library
    // Since 7z decompression in browser is complex, we'll use the fact that 
    // our server falls back to gzip when 7z not available
    // For now, we'll assume it's gzip or use a simple approach
    try {
      // Try pako (gzip decompression)
      const decompressed = pako.inflate(compressedData, { to: 'string' });
      return decompressed;
    } catch(e) {
      // If that fails, try to read as text (maybe not compressed)
      const decoder = new TextDecoder('utf-8');
      return decoder.decode(compressedData);
    }
  } else {
    // Assume it's raw or gzip
    try {
      const decompressed = pako.inflate(compressedData, { to: 'string' });
      return decompressed;
    } catch(e) {
      const decoder = new TextDecoder('utf-8');
      return decoder.decode(compressedData);
    }
  }
}

// ========== GENERATE TEXT PREVIEW (7z compressed chunks) ==========
async function generatePreview() {
  let selected = Array.from(selectedFiles);
  if (selected.length === 0) { showError("No files selected"); return; }
  
  previewBtn.disabled = true;
  showStatus(`📦 Downloading 7z compressed preview for ${selected.length} files...`);
  progressBar.style.display = "block";
  progressBar.value = 0;
  
  try {
    // First request
    let res = await fetch(`${BACKEND_URL}/api/generate-text`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        owner: currentOwner,
        repo: currentRepo,
        selectedPaths: selected,
        repoId: currentRepoId,
        includeDirStructure: includeDirStructure.checked,
        showLineNumbers: showLineNumbers.checked,
        removeComments: removeComments.checked,
        removeEmptyLines: removeEmptyLines.checked,
        chunkIndex: 0
      })
    });
    
    const totalChunks = parseInt(res.headers.get('X-Total-Chunks'));
    const totalSize = parseInt(res.headers.get('X-Total-Size'));
    const sessionId = res.headers.get('X-Session-Id');
    const hasMore = res.headers.get('X-Has-More') === 'true';
    const format = res.headers.get('X-Format') || '7z';
    
    // Get first chunk
    const firstChunk = await res.arrayBuffer();
    let chunks = [new Uint8Array(firstChunk)];
    
    if (hasMore) {
      showStatus(`📥 Downloading ${totalChunks} chunks (${(totalSize / 1024 / 1024).toFixed(2)} MB compressed)...`);
      
      for (let i = 1; i < totalChunks; i++) {
        let chunkRes = await fetch(`${BACKEND_URL}/api/generate-text`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            owner: currentOwner,
            repo: currentRepo,
            selectedPaths: selected,
            repoId: currentRepoId,
            includeDirStructure: includeDirStructure.checked,
            showLineNumbers: showLineNumbers.checked,
            removeComments: removeComments.checked,
            removeEmptyLines: removeEmptyLines.checked,
            chunkIndex: i,
            sessionId: sessionId
          })
        });
        
        const chunkData = await chunkRes.arrayBuffer();
        chunks.push(new Uint8Array(chunkData));
        progressBar.value = (i / totalChunks) * 100;
      }
    }
    
    progressBar.value = 100;
    showStatus(`📦 Decompressing ${format} archive...`);
    
    // Combine chunks
    const totalLength = chunks.reduce((sum, chunk) => sum + chunk.length, 0);
    const compressedData = new Uint8Array(totalLength);
    let offset = 0;
    for (const chunk of chunks) {
      compressedData.set(chunk, offset);
      offset += chunk.length;
    }
    
    // Decompress
    let textContent;
    try {
      // Try to decompress using pako (supports gzip)
      textContent = pako.inflate(compressedData, { to: 'string' });
    } catch(e) {
      // If decompression fails, maybe it's not compressed or it's raw
      const decoder = new TextDecoder('utf-8');
      textContent = decoder.decode(compressedData);
    }
    
    currentTextContent = textContent;
    outputPre.textContent = currentTextContent;
    outputContainer.style.display = "block";
    
    const compressionRatio = ((1 - compressedData.length / textContent.length) * 100).toFixed(1);
    showStatus(`✅ Preview ready! ${selected.length} files (${compressionRatio}% smaller with ${format})`, "success");
    progressBar.style.display = "none";
  } catch(err) {
    progressBar.style.display = "none";
    showError(err.message);
  } finally {
    previewBtn.disabled = false;
  }
}

// ========== DOWNLOAD ZIP (Chunked) ==========
async function downloadZip() {
  let selected = Array.from(selectedFiles);
  if (selected.length === 0) { showError("No files selected"); return; }
  
  downloadZipBtn.disabled = true;
  showStatus(`📦 Preparing ZIP download for ${selected.length} files...`);
  progressBar.style.display = "block";
  progressBar.value = 0;
  
  try {
    let res = await fetch(`${BACKEND_URL}/api/generate-zip`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        owner: currentOwner,
        repo: currentRepo,
        selectedPaths: selected,
        repoId: currentRepoId,
        includeDirStructure: includeDirStructure.checked,
        showLineNumbers: showLineNumbers.checked,
        removeComments: removeComments.checked,
        removeEmptyLines: removeEmptyLines.checked,
        chunkIndex: 0
      })
    });
    
    const totalChunks = parseInt(res.headers.get('X-Total-Chunks'));
    const totalSize = parseInt(res.headers.get('X-Total-Size'));
    const sessionId = res.headers.get('X-Session-Id');
    const hasMore = res.headers.get('X-Has-More') === 'true';
    
    const firstChunk = await res.arrayBuffer();
    let chunks = [new Uint8Array(firstChunk)];
    
    if (hasMore) {
      showStatus(`📥 Downloading ${totalChunks} chunks (${(totalSize / 1024 / 1024).toFixed(2)} MB ZIP)...`);
      
      for (let i = 1; i < totalChunks; i++) {
        let chunkRes = await fetch(`${BACKEND_URL}/api/generate-zip`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            owner: currentOwner,
            repo: currentRepo,
            selectedPaths: selected,
            repoId: currentRepoId,
            includeDirStructure: includeDirStructure.checked,
            showLineNumbers: showLineNumbers.checked,
            removeComments: removeComments.checked,
            removeEmptyLines: removeEmptyLines.checked,
            chunkIndex: i,
            sessionId: sessionId
          })
        });
        
        const chunkData = await chunkRes.arrayBuffer();
        chunks.push(new Uint8Array(chunkData));
        progressBar.value = (i / totalChunks) * 100;
      }
    }
    
    progressBar.value = 100;
    showStatus(`📦 Assembling ZIP file...`);
    
    const totalLength = chunks.reduce((sum, chunk) => sum + chunk.length, 0);
    const zipBytes = new Uint8Array(totalLength);
    let offset = 0;
    for (const chunk of chunks) {
      zipBytes.set(chunk, offset);
      offset += chunk.length;
    }
    
    const blob = new Blob([zipBytes], { type: 'application/zip' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `repomix_${currentOwner}_${currentRepo}_${Date.now()}.zip`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    const sizeMB = (blob.size / 1024 / 1024).toFixed(2);
    showStatus(`✅ Downloaded ${sizeMB} MB ZIP file!`, "success");
    progressBar.style.display = "none";
  } catch(err) {
    progressBar.style.display = "none";
    showError(err.message);
  } finally {
    downloadZipBtn.disabled = false;
  }
}

// ========== SAVE TEXT FILE ==========
function downloadTextFile() {
  if (!currentTextContent) {
    showError("No text content to download");
    return;
  }
  
  const blob = new Blob([currentTextContent], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `repomix_${currentOwner || 'export'}_${currentRepo || Date.now()}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  
  showStatus(`✅ Downloaded text file (${(blob.size / 1024).toFixed(1)} KB)`, "success");
}

// ========== RESET ==========
function resetAll() {
  allFiles = [];
  selectedFiles.clear();
  expandedFolders.clear();
  fileTreeData = null;
  currentTextContent = "";
  analysisPanel.style.display = "none";
  fileTreeContainer.innerHTML = '<div style="text-align:center; padding:40px">🔍 Analyze a repository first</div>';
  outputContainer.style.display = "none";
  updateSelectionStats();
  previewBtn.disabled = true;
  downloadZipBtn.disabled = true;
  currentRepoId = null;
  showStatus("");
}

// ========== LOCAL/ZIP HANDLERS ==========
function setSourceType(type) {
  currentSourceType = type;
  btnGithub.classList.toggle("active", type === "github");
  btnLocal.classList.toggle("active", type === "local");
  btnZip.classList.toggle("active", type === "zip");
  githubBlock.style.display = type === "github" ? "block" : "none";
  localBlock.style.display = type === "local" ? "block" : "none";
  zipBlock.style.display = type === "zip" ? "block" : "none";
  resetAll();
}

btnGithub.onclick = () => setSourceType("github");
btnLocal.onclick = () => setSourceType("local");
btnZip.onclick = () => setSourceType("zip");
analyzeBtn.onclick = analyzeGitHub;
previewBtn.onclick = generatePreview;
downloadZipBtn.onclick = downloadZip;
resetBtn.onclick = resetAll;
copyBtn.onclick = async () => {
  await navigator.clipboard.writeText(outputPre.textContent);
  copyBtn.textContent = "✅ Copied!";
  setTimeout(() => copyBtn.textContent = "📋 Copy", 2000);
};
downloadTextBtn.onclick = downloadTextFile;

console.log("🚀 Repomix ready! 7z compression + separate endpoints");
console.log("📄 Preview: Downloads 7z compressed chunks, decompresses, displays text");
console.log("📦 Download: Downloads ZIP chunks, assembles, saves file");
</script>
